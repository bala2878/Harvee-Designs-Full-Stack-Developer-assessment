# Host Nginx config — /etc/nginx/sites-available/task2-sql-assistant.conf on
# the AWS VPS, symlinked into sites-enabled. Proxies to the
# task2-frontend container (which itself proxies /api/ to task2-backend —
# see task2-ai-sql-assistant/frontend/nginx.conf).

upstream task2_frontend {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    server_name {server name }; # need to change the server name 

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name {server name }; # need to change the server name 

    ssl_certificate     /etc/letsencrypt/live/sql-assistant.harveedesigns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sql-assistant.harveedesigns.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 30M;  # dataset uploads

    location / {
        proxy_pass http://task2_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
