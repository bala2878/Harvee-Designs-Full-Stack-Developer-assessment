# Host Nginx config — /etc/nginx/sites-available/task1-allocation.conf on the
# AWS VPS, symlinked into sites-enabled. Proxies to the task1-frontend
# container (which itself proxies /api/ to task1-backend — see
# task1-course-allocation/frontend/nginx.conf).

upstream task1_frontend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name {server name }; # need to change the server name

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name {server name}; # need to change the server name 

    ssl_certificate     /etc/letsencrypt/live/allocation.harveedesigns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allocation.harveedesigns.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location / {
        proxy_pass http://task1_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
