name: Task 1 - Frontend CI

on:
  push:
    branches: [main]
    paths: ["task1-course-allocation/frontend/**", ".github/workflows/task1-frontend-ci.yml"]
  pull_request:
    paths: ["task1-course-allocation/frontend/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task1-course-allocation/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: task1-course-allocation/frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build
